##
## Reusable workflow: transition Linear issues on PR events.
##
## Usage from a consuming repo (.github/workflows/handle-pr-events.yml):
##
##   on:
##     pull_request_review:
##       types: [submitted]
##     pull_request:
##       types: [converted_to_draft, ready_for_review, closed]
##
##   jobs:
##     handle-pr-event:
##       uses: josh803316/shared-ci-workflows/.github/workflows/pr-linear-handler.yml@main
##       with:
##         event_type: ${{ github.event_name == 'pull_request_review' && 'PR_REVIEW_SUBMITTED' || github.event.pull_request.draft && 'PR_DRAFT' || github.event.pull_request.merged && 'PR_MERGED' || 'PR_READY' }}
##         review_state: ${{ github.event.review.state || '' }}
##         branch_name: ${{ github.event.pull_request.head.ref }}
##         pr_title: ${{ github.event.pull_request.title }}
##       secrets: inherit
##

name: PR Linear Handler

on:
  workflow_call:
    inputs:
      event_type:
        description: "Event type: PUSH | PR_DRAFT | PR_READY | PR_REVIEW_SUBMITTED | PR_MERGED"
        type: string
        required: true
      review_state:
        description: "Review state (approved | changes_requested)"
        type: string
        required: false
        default: ''
      branch_name:
        description: "Source branch name"
        type: string
        required: true
      pr_title:
        description: "PR title"
        type: string
        required: false
        default: ''
      linear_key:
        description: "Explicit Linear issue key override (e.g. PRO-123)"
        type: string
        required: false
        default: ''
    secrets:
      LINEAR_API_KEY:
        description: "Linear API key for issue transitions"
        required: true
      BUN_AUTH_TOKEN:
        description: "GitHub PAT for installing @josh803316 packages"
        required: true

jobs:
  transition-linear:
    name: Transition Linear Issue
    runs-on: ubuntu-latest
    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure .npmrc
        run: |
          echo "@josh803316:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${BUN_AUTH_TOKEN}" >> ~/.npmrc
        env:
          BUN_AUTH_TOKEN: ${{ secrets.BUN_AUTH_TOKEN }}

      - name: Transition Linear issue
        run: |
          bunx @josh803316/shared-ci-workflows workflow-linear transition \
            --event-type "$EVENT_TYPE" \
            ${REVIEW_STATE:+--review-state "$REVIEW_STATE"} \
            --branch-name "$BRANCH_NAME" \
            ${PR_TITLE:+--pr-title "$PR_TITLE"} \
            ${LINEAR_KEY:+--linear-key "$LINEAR_KEY"}
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          BUN_AUTH_TOKEN: ${{ secrets.BUN_AUTH_TOKEN }}
          EVENT_TYPE: ${{ inputs.event_type }}
          REVIEW_STATE: ${{ inputs.review_state }}
          BRANCH_NAME: ${{ inputs.branch_name }}
          PR_TITLE: ${{ inputs.pr_title }}
          LINEAR_KEY: ${{ inputs.linear_key }}
