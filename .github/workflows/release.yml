name: Release shared-ci-workflows

on:
  push:
    branches:
      - main

jobs:
  release:
    permissions:
      contents: write
      issues: write
      packages: write
      pull-requests: write
    uses: josh803316/shared-ci-workflows/.github/workflows/semantic-release-shared-libs.yml@main
    with:
      repository: shared-ci-workflows
      publish: 'true'
    secrets: inherit
