##
## Reusable workflow: deploy a preview to Vercel on every pull request.
##
## Usage from a consuming repo (.github/workflows/vercel-preview.yml):
##
##   jobs:
##     preview:
##       uses: josh803316/shared-ci-workflows/.github/workflows/vercel-preview.yml@main
##       with:
##         app-name: my-app          # optional label for PR comments
##         vercel-project-id: ${{ vars.VERCEL_PROJECT_ID }}
##         vercel-org-id: ${{ vars.VERCEL_ORG_ID }}
##       secrets: inherit
##
## Required secrets in the calling repo:
##   VERCEL_TOKEN    - Vercel personal access token
##   BUN_AUTH_TOKEN  - GitHub PAT with packages:read (used as GITHUB_TOKEN for bun install)
##

name: Vercel Preview Deployment

on:
  workflow_call:
    inputs:
      app-name:
        description: "Human-readable app name used in PR comments"
        type: string
        required: false
        default: "App"
      vercel-project-id:
        description: "Vercel project ID (prj_xxx)"
        type: string
        required: true
      vercel-org-id:
        description: "Vercel org/team ID (team_xxx)"
        type: string
        required: true
      node-version:
        description: "Node.js version for the build step"
        type: string
        required: false
        default: "20"
      install-command:
        description: "Command to install dependencies"
        type: string
        required: false
        default: "bun install --frozen-lockfile"
      build-command:
        description: "Command to build the project"
        type: string
        required: false
        default: "bun run build"
    outputs:
      deployment-url:
        description: "The preview deployment URL"
        value: ${{ jobs.deploy-preview.outputs.deployment-url }}

jobs:
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: ${{ inputs.install-command }}
        env:
          GITHUB_TOKEN: ${{ secrets.BUN_AUTH_TOKEN }}

      - name: Build
        run: ${{ inputs.build-command }}

      - name: Pull Vercel environment (preview)
        run: bunx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ inputs.vercel-org-id }}
          VERCEL_PROJECT_ID: ${{ inputs.vercel-project-id }}

      - name: Build Vercel output
        run: bunx vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ inputs.vercel-org-id }}
          VERCEL_PROJECT_ID: ${{ inputs.vercel-project-id }}

      - name: Deploy to Vercel (preview)
        id: deploy
        run: |
          DEPLOYMENT_URL=$(bunx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment-url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Preview URL: $DEPLOYMENT_URL"
        env:
          VERCEL_ORG_ID: ${{ inputs.vercel-org-id }}
          VERCEL_PROJECT_ID: ${{ inputs.vercel-project-id }}

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            const appName = '${{ inputs.app-name }}';
            const body = `### 🚀 ${appName} Preview Deployment\n\n**URL:** ${url}\n\n_Deployed from commit \`${{ github.sha }}\`_`;

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

              const existing = comments.find(c => c.body?.includes(`${appName} Preview Deployment`));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            } catch (error) {
              core.warning(`Failed to create or update PR comment (non-fatal): ${error.message}`);
            }
