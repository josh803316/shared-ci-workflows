##
## Reusable workflow: promote to Vercel production on merge to main.
##
## Usage from a consuming repo (.github/workflows/release.yml):
##
##   on:
##     push:
##       branches: [main]
##
##   jobs:
##     deploy:
##       uses: josh803316/shared-ci-workflows/.github/workflows/vercel-production.yml@main
##       with:
##         vercel-project-id: ${{ vars.VERCEL_PROJECT_ID }}
##         vercel-org-id: ${{ vars.VERCEL_ORG_ID }}
##       secrets: inherit
##
## Required secrets in the calling repo:
##   VERCEL_TOKEN    - Vercel personal access token
##   BUN_AUTH_TOKEN  - GitHub PAT with packages:read (used as GITHUB_TOKEN for bun install)
##

name: Vercel Production Deployment

on:
  workflow_call:
    inputs:
      app-name:
        description: "Human-readable app name"
        type: string
        required: false
        default: "App"
      vercel-project-id:
        description: "Vercel project ID (prj_xxx)"
        type: string
        required: true
      vercel-org-id:
        description: "Vercel org/team ID (team_xxx)"
        type: string
        required: true
      install-command:
        description: "Command to install dependencies"
        type: string
        required: false
        default: "bun install --frozen-lockfile"
      build-command:
        description: "Command to build the project"
        type: string
        required: false
        default: "bun run build"
    outputs:
      deployment-url:
        description: "The production deployment URL"
        value: ${{ jobs.deploy-production.outputs.deployment-url }}

jobs:
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: ${{ inputs.install-command }}
        env:
          GITHUB_TOKEN: ${{ secrets.BUN_AUTH_TOKEN }}

      - name: Build
        run: ${{ inputs.build-command }}

      - name: Pull Vercel environment (production)
        run: bunx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ inputs.vercel-org-id }}
          VERCEL_PROJECT_ID: ${{ inputs.vercel-project-id }}

      - name: Build Vercel output
        run: bunx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ inputs.vercel-org-id }}
          VERCEL_PROJECT_ID: ${{ inputs.vercel-project-id }}

      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          DEPLOYMENT_URL=$(bunx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment-url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Production URL: $DEPLOYMENT_URL"
        env:
          VERCEL_ORG_ID: ${{ inputs.vercel-org-id }}
          VERCEL_PROJECT_ID: ${{ inputs.vercel-project-id }}

      - name: Create deployment summary
        run: |
          echo "## 🚀 ${{ inputs.app-name }} Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deploy.outputs.deployment-url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
