##
## Reusable workflow: promote to Vercel production on merge to main.
##
## Usage from a consuming repo (.github/workflows/production.yml):
##
##   on:
##     push:
##       branches: [main]
##
##   jobs:
##     production:
##       uses: josh803316/shared-ci-workflows/.github/workflows/vercel-production.yml@main
##       with:
##         vercel-project-id: prj_xxxxx
##         vercel-org-id: team_xxxxx
##       secrets:
##         vercel-token: ${{ secrets.VERCEL_TOKEN }}
##

name: Vercel Production Deployment

on:
  workflow_call:
    inputs:
      app-name:
        description: "Human-readable app name"
        type: string
        required: false
        default: "App"
      vercel-project-id:
        description: "Vercel project ID (prj_xxx)"
        type: string
        required: true
      vercel-org-id:
        description: "Vercel org/team ID (team_xxx)"
        type: string
        required: true
      install-command:
        description: "Command to install dependencies"
        type: string
        required: false
        default: "bun install --frozen-lockfile"
      build-command:
        description: "Command to build the project"
        type: string
        required: false
        default: "bun run build"
    secrets:
      vercel-token:
        description: "Vercel personal access token"
        required: true
    outputs:
      deployment-url:
        description: "The production deployment URL"
        value: ${{ jobs.deploy-production.outputs.deployment-url }}

jobs:
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: ${{ inputs.install-command }}

      - name: Build
        run: ${{ inputs.build-command }}

      - name: Pull Vercel environment (production)
        run: bunx vercel pull --yes --environment=production --token=${{ secrets.vercel-token }}
        env:
          VERCEL_ORG_ID: ${{ inputs.vercel-org-id }}
          VERCEL_PROJECT_ID: ${{ inputs.vercel-project-id }}

      - name: Build Vercel output
        run: bunx vercel build --prod --token=${{ secrets.vercel-token }}
        env:
          VERCEL_ORG_ID: ${{ inputs.vercel-org-id }}
          VERCEL_PROJECT_ID: ${{ inputs.vercel-project-id }}

      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          DEPLOYMENT_URL=$(bunx vercel deploy --prebuilt --prod --token=${{ secrets.vercel-token }})
          echo "deployment-url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Production URL: $DEPLOYMENT_URL"
        env:
          VERCEL_ORG_ID: ${{ inputs.vercel-org-id }}
          VERCEL_PROJECT_ID: ${{ inputs.vercel-project-id }}

      - name: Create deployment summary
        run: |
          echo "## 🚀 ${{ inputs.app-name }} Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deploy.outputs.deployment-url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
